<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomoki Takazawa | Digital Twin & Human Brain / Robotics Research</title>
  <meta name="description"
      content="Personal website of Tomoki Takazawa, focusing on digital twins, laboratory automation, robotics, and AI research." />
  <style>
    /* リセット */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ナビゲーションバー */
    .navbar {
      background-color: #020016;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      height: 60px;
    }
    .navbar .logo img {
      height: 40px;
    }
    .navbar .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 16px;
      cursor: pointer;
    }
    /* ホバーエフェクト */
    .navbar .nav-links a {
      padding: 6px 12px;
      border-radius: 6px;
      transition: 
        background-color 0.4s cubic-bezier(0.37, 0, 0.63, 1),
        color 0.4s cubic-bezier(0.37, 0, 0.63, 1),
        letter-spacing 0.4s cubic-bezier(0.37, 0, 0.63, 1);
    }
    .navbar .nav-links a:hover {
      background: #fff;
      color: #020016;
      letter-spacing: 0.15em;
    }

    /* メイン画像 */
    .main-image {
      width: 100%;
      height: calc(100vh - 60px);
      object-fit: cover;
      display: block;
    }

    /* フェードイン（ページ読み込み時） */
    body {
      opacity: 0;
      animation: fadeIn 2.5s ease forwards;
    }
    /* フェードアウト（ページ遷移時） */
    body.fade-out {
      opacity: 0;
      transition: opacity 2.5s ease;
    }
    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<script>
  document.querySelectorAll('a[href]').forEach(link => {
    link.addEventListener('click', e => {
      const url = link.getAttribute('href');

      // 除外条件
      if (
        url.startsWith('#') ||
        url.startsWith('http') ||
        link.target === '_blank'
      ) return;

      e.preventDefault();
      document.body.classList.add('fade-out');

      setTimeout(() => {
        window.location.href = url;
      }, 400);
    });
  });
</script>
<body>
  <nav class="navbar">
    <div class="logo">
      <a href="#"><img src="figure/logo.png" alt="Logo"></a>
    </div>
    <div class="nav-links">
      <a href="about.html">About</a>
      <a href="skill.html">Skill</a>
      <a href="publications.html">Publications</a>
      <a href="blog.html">Blog</a>
    </div>
  </nav>
  <img src="figure/main_digitaltwin.png" alt="Main Image" class="main-image">
</body>
</html>
