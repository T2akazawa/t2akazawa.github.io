<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Career | Tomoki Takazawa</title>
  <meta name="description"
      content="Career of Tomoki Takazawa, focusing on digital twins, laboratory automation, robotics, and AI research." />
  <style>
    /* リセット */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #020016; }
    /* ナビゲーション */
    .navbar {
      background-color: #020016;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px 20px;
      padding: 12px 20px;
      min-height: 60px;
    }
    .navbar .logo img {
      height: 40px;
    }
    .navbar .nav-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }
    .navbar .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 16px;
    }
    /* ホバーエフェクト */
    .navbar .nav-links a {
      padding: 6px 12px;
      border-radius: 6px;
      transition: 
        background-color 0.4s cubic-bezier(0.37, 0, 0.63, 1),
        color 0.4s cubic-bezier(0.37, 0, 0.63, 1),
        letter-spacing 0.4s cubic-bezier(0.37, 0, 0.63, 1);
    }
    .navbar .nav-links a:hover {
      background: #fff;
      color: #020016;
      letter-spacing: 0.15em;
    }
    /* Hero セクション */
    .hero {
      position: relative;
      width: 100%;
      background-color: #f0f0f0;
      overflow: hidden;
    }
    .hero img {
      width: 100%;
      height: auto;
      display: block;
    }
    .hero .overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      line-height: 1.4;
    }
    .overlay-name-en {
      font-family: 'Times New Roman', serif;
      font-size: clamp(1.3rem, 3vw, 1.75rem);
      color: white;
      display: block;
      white-space: nowrap;
    }
    .overlay-name-ja {
      /* font-family: '游明朝', 'Yu Mincho', serif; */
      font-size: clamp(0.8rem, 1.8vw, 1rem);
      color: white;
      display: block;
      margin-top: 0.15em;
      white-space: nowrap;
    }

    /* ロボティクスセクション */
    .robotics {
      background-color: #020016;
      text-align: center;
      margin-top: 20px;
    }
    .robotics-title {
      font-size: 1rem;
      margin-bottom: 30px;
      color: white;
    }
    .robotics-list {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: center;
      color: #aaa;
      padding: 0 20px 8px;
    }
    .robotics-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 200px;
      text-align: center;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .robotics-item img {
      width: 200px;
      height: 100px;
      object-fit: contain;
      align-items: center;
      margin-bottom: 8px;
    }
    .robotics-item span {
      font-size: 14px;
      color: #aaa;
    }
    .robotics-item:hover {
      transform: translateY(-4px);
      opacity: 0.85;
    }

    /* コンピュータビジョンセクション */
    .computervision {
      background-color: #020016;
      text-align: center;
      margin-top: 60px;
    }
    .computervision-title {
      font-size: 1rem;
      margin-bottom: 30px;
      color: white;
    }
    .computervision-list {
      display: flex;
      gap: 5px;
      flex-wrap: nowrap;
      justify-content: center;
      color: #aaa;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0 20px 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(200, 200, 255, 0.75) rgba(255, 255, 255, 0.08);
      -webkit-overflow-scrolling: touch;
    }
    .computervision-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 150px;
      flex: 0 0 auto;
      text-align: center;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .computervision-item img {
      width: 150px;
      height: 100px;
      object-fit: contain;
      align-items: center;
      margin-bottom: 8px;
    }
    .computervision-item span {
      font-size: 14px;
      color: #aaa;
    }
    .computervision-item:hover {
      transform: translateY(-4px);
      opacity: 0.85;
    }

    /* 人セクション */
    .human {
      background-color: #020016;
      text-align: center;
      margin-top: 60px;
    }
    .human-title {
      font-size: 1rem;
      margin-bottom: 30px;
      color: white;
    }
    .human-list {
      display: flex;
      gap: 5px;
      flex-wrap: nowrap;
      justify-content: center;
      color: #aaa;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0 20px 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(200, 200, 255, 0.75) rgba(255, 255, 255, 0.08);
      -webkit-overflow-scrolling: touch;
    }
    .computervision-list::-webkit-scrollbar,
    .human-list::-webkit-scrollbar {
      height: 10px;
    }
    .computervision-list::-webkit-scrollbar-track,
    .human-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }
    .computervision-list::-webkit-scrollbar-thumb,
    .human-list::-webkit-scrollbar-thumb {
      background: linear-gradient(90deg, rgba(154, 164, 255, 0.95), rgba(204, 228, 255, 0.9));
      border-radius: 999px;
      border: 2px solid rgba(2, 0, 22, 0.35);
    }
    .computervision-list::-webkit-scrollbar-thumb:hover,
    .human-list::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(90deg, rgba(186, 194, 255, 0.98), rgba(230, 242, 255, 0.95));
    }
    .human-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 150px;
      flex: 0 0 auto;
      text-align: center;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .human-item img {
      width: 150px;
      height: 100px;
      object-fit: contain;
      align-items: center;
      margin-bottom: 8px;
    }
    .human-item span {
      font-size: 14px;
      color: #aaa;
    }
    .human-item:hover {
      transform: translateY(-4px);
      opacity: 0.85;
    }

    /* キャリアセクション */
    .career {
      background-color: #020016;
      text-align: center;
      padding-top: 60px;
      padding-bottom: 40px;
    }
    .career-title {
      /* font-family: 'Times New Roman', serif; */
      font-size: 1rem;
      margin: 0;
      color: white;
    }
    .career-list {
      max-width: 750px;
      margin: 20px auto 0;
      padding: 0 20px;
      text-align: left;
    }
    .career-list p {
      margin-top: 1em;
      font-size: 1rem;
      color: white;
      line-height: 0.4;
    }
    .career-item {
      display: grid;
      grid-template-columns: 90px 1fr; /* 日付 | 本文 */
      column-gap: 16px;
      margin-top: 1.4em;
    }
    .career-date {
      color: #aaa;
      font-size: 1rem;
      text-align: left;
      white-space: nowrap;
    }
    .career-body {
      color: white;
      font-size: 1rem;
      line-height: 1.6;
    }

    /* フェードイン（ページ読み込み時） */
    body {
      opacity: 0;
      animation: fadeIn 2.5s ease forwards;
    }
    /* フェードアウト（ページ遷移時） */
    body.fade-out {
      opacity: 0;
      transition: opacity 2.5s ease;
    }
    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }
    @media (max-width: 768px) {
      .navbar {
        justify-content: center;
        padding: 12px 16px;
      }
      .navbar .logo,
      .navbar .nav-links {
        width: 100%;
      }
      .navbar .logo {
        text-align: center;
      }
      .navbar .nav-links {
        justify-content: center;
      }
      .navbar .nav-links a {
        font-size: 15px;
      }
      .robotics-list {
        justify-content: center;
      }
      .computervision-list,
      .human-list {
        justify-content: center;
        padding: 0 16px 8px;
      }
      .career-list {
        padding: 0 16px;
      }
      .hero img {
        min-height: 160px;
        object-fit: cover;
      }
      .hero .overlay {
        width: calc(100% - 32px);
      }
      .overlay-name-en {
        font-size: clamp(1rem, 5.2vw, 1.35rem);
      }
      .overlay-name-ja {
        font-size: clamp(0.72rem, 3.2vw, 0.92rem);
      }
    }
    @media (max-width: 480px) {
      .navbar {
        padding: 12px 12px;
      }
      .navbar .nav-links {
        padding-bottom: 4px;
      }
      .robotics-list,
      .computervision-list,
      .human-list {
        padding: 0 12px 8px;
      }
      .career-list {
        padding: 0 12px;
      }
      .hero img {
        min-height: 140px;
      }
      .hero .overlay {
        width: calc(100% - 24px);
      }
      .overlay-name-en {
        font-size: clamp(0.92rem, 5vw, 1.15rem);
      }
      .overlay-name-ja {
        font-size: clamp(0.68rem, 3vw, 0.82rem);
      }
    }
  </style>
</head>
<script>
  document.querySelectorAll('a[href]').forEach(link => {
    link.addEventListener('click', e => {
      const url = link.getAttribute('href');

      // 除外条件
      if (
        url.startsWith('#') ||
        url.startsWith('http') ||
        link.target === '_blank'
      ) return;

      e.preventDefault();
      document.body.classList.add('fade-out');

      setTimeout(() => {
        window.location.href = url;
      }, 400);
    });
  });
</script>
<body>
  <!-- ナビゲーション -->
  <nav class="navbar">
    <div class="logo">
      <a href="index.html"><img src="figure/logo.png" alt="Logo"></a>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="skill.html">Skill</a>
      <a href="publications.html">Publications</a>
      <a href="blog.html">Blog</a>
    </div>
  </nav>

  <!-- Hero（Tape Image + テキスト） -->
  <div class="hero">
    <img src="figure/tape.png" alt="Tape Image">
    <div class="overlay">
      <span class="overlay-name-en"><b>Tomoki Takazawa</b></span>
      <span class="overlay-name-ja">高澤 知起</span>
    </div>
  </div>

  <!-- Robotics セクション -->
  <section class="robotics">
    <h2 class="robotics-title">Robotics</h2>
    <div class="robotics-list">
      <div class="robotics-item">
        <img src="figure/icon_motionplanning.png" alt="Motion Planning">
        <span>動作経路計画</span>
      </div>
      <div class="robotics-item">
        <img src="figure/icon_labautomation.png" alt="Lab Automation">
        <span>ラボラトリオートメーション</span>
      </div>
      <div class="robotics-item">
        <img src="figure/icon_digitaltwin.png" alt="Digital Twin">
        <span>デジタルツイン</span>
      </div>
    </div>
  </section>

  <!-- Computer Vision セクション -->
  <section class="computervision">
    <h2 class="computervision-title">Computer Vision</h2>
    <div class="computervision-list">
      <div class="computervision-item">
        <img src="figure/icon_poseestimation_object.png" alt="Posture Estimation (Object)">
        <span>姿勢推定（物体）</span>
      </div>
      <div class="computervision-item">
        <img src="figure/icon_poseestimation_human.png" alt="Posture Estimation (Human)">
        <span>姿勢推定（人）</span>
      </div>
    </div>
  </section>

  <!-- Human セクション -->
  <section class="human">
    <h2 class="human-title">Human Brain</h2>
    <div class="human-list">
      <div class="human-item">
        <img src="figure/icon_posturecontrol.png" alt="Posture Control">
        <span>立位姿勢制御</span>
      </div>
      <div class="human-item">
        <img src="figure/icon_reinforcementlearning.png" alt="Reinforcement Learning">
        <span>強化学習</span>
      </div>
    </div>
  </section>

  <!-- Career セクション -->
  <section class="career">
    <h2 class="career-title">Career</h2>
    <div class="career-list">
      <div class="career-item">
        <div class="career-date">2021.03</div>
        <div class="career-body">
          大阪大学 基礎工学部 システム科学科 生物工学コース 卒業（工学）
        </div>
        <div class="career-date">2023.03</div>
        <div class="career-body">
          大阪大学大学院 基礎工学研究科 機能創成専攻 生体工学領域 博士前期課程 修了（工学）
        </div>
        <div class="career-date">2023.04～</div>
        <div class="career-body">
          分析計測機器メーカー 研究所 勤務
        </div>
      </div>
    </div>
  </section>

</body>
</html>
